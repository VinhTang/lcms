{% extends 'base.html' %}

{% block title %}Tạo học phí - LCMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus-circle me-2"></i>Tạo học phí mới</h1>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="sb-card">
            <div class="sb-card-header">
                <i class="fas fa-info-circle me-2"></i>Thông tin học phí
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Học sinh & Lớp <span class="text-danger">*</span></label>
                        <select name="enrollment" class="form-select" required>
                            <option value="">Chọn học sinh...</option>
                            {% for e in enrollments %}
                            <option value="{{ e.id }}">{{ e.student.full_name }} - {{ e.class_enrolled.class_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Loại học phí <span class="text-danger">*</span></label>
                        <select name="tuition_type" class="form-select" id="tuitionType" required>
                            <option value="monthly">Theo tháng</option>
                            <option value="course">Theo khóa học</option>
                        </select>
                    </div>
                    
                    <div class="mb-3" id="monthField">
                        <label class="form-label">Tháng <span class="text-danger">*</span></label>
                        <input type="month" name="month" class="form-control">
                    </div>
                    
                    <div class="mb-3" id="courseField" style="display: none;">
                        <label class="form-label">Tên khóa học <span class="text-danger">*</span></label>
                        <input type="text" name="course_name" class="form-control" placeholder="VD: Khóa hè 2024">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Số tiền (VNĐ) <span class="text-danger">*</span></label>
                        <input type="number" name="amount" class="form-control" min="0" step="1000" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Ngày đến hạn <span class="text-danger">*</span></label>
                        <input type="date" name="due_date" class="form-control" required>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Tạo học phí
                        </button>
                        <a href="{% url 'payments:tuition_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i> Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.getElementById('tuitionType').addEventListener('change', function() {
    const monthField = document.getElementById('monthField');
    const courseField = document.getElementById('courseField');
    
    if (this.value === 'monthly') {
        monthField.style.display = 'block';
        courseField.style.display = 'none';
    } else {
        monthField.style.display = 'none';
        courseField.style.display = 'block';
    }
});
</script>
{% endblock %}
