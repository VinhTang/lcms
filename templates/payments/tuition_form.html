{% extends 'base.html' %}

{% block title %}Tạo học phí - LCMS{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">
                <i class="fas fa-plus-circle text-green-500 mr-2"></i>Tạo học phí mới
            </h1>
        </div>
    </div>

    <div class="max-w-xl">
        <div class="card">
            <div class="px-6 py-4 border-b border-gray-100">
                <h3 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-info-circle text-primary-500 mr-2"></i>Thông tin học phí
                </h3>
            </div>
            <div class="p-6">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Học sinh & Lớp <span class="text-red-500">*</span></label>
                        <select name="enrollment" class="input-field" required>
                            <option value="">Chọn học sinh...</option>
                            {% for e in enrollments %}
                            <option value="{{ e.id }}">{{ e.student.full_name }} - {{ e.class_enrolled.class_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Loại học phí <span class="text-red-500">*</span></label>
                            <select name="tuition_type" class="input-field" id="tuitionType" required>
                                <option value="monthly">Theo tháng</option>
                                <option value="course">Theo khóa học</option>
                            </select>
                        </div>
                        <div id="monthField">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tháng <span class="text-red-500">*</span></label>
                            <input type="month" name="month" class="input-field">
                        </div>
                        <div id="courseField" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tên khóa học <span class="text-red-500">*</span></label>
                            <input type="text" name="course_name" class="input-field" placeholder="VD: Khóa hè 2024">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Số tiền (VNĐ) <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i class="fas fa-money-bill absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="number" name="amount" class="input-field !pl-11" min="0" step="1000" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Ngày đến hạn <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i class="fas fa-calendar-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="date" name="due_date" class="input-field !pl-11" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                        <a href="{% url 'payments:tuition_list' %}"
                           hx-get="{% url 'payments:tuition_list' %}"
                           hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML"
                           hx-push-url="true"
                           class="btn-secondary px-6 py-2.5">Hủy</a>
                        <button type="submit" class="btn-primary px-6 py-2.5">
                            <i class="fas fa-save mr-2"></i>Tạo học phí
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('tuitionType').addEventListener('change', function() {
    const monthField = document.getElementById('monthField');
    const courseField = document.getElementById('courseField');
    
    if (this.value === 'monthly') {
        monthField.classList.remove('hidden');
        courseField.classList.add('hidden');
    } else {
        monthField.classList.add('hidden');
        courseField.classList.remove('hidden');
    }
});
</script>
{% endblock %}
