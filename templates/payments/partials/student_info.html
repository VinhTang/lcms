{% if student %}
<div class="mt-4 p-4 bg-gray-50 rounded-lg border border-gray-100 flex flex-col gap-2">
    <div class="flex items-center gap-2">
        <i class="fas fa-id-card text-gray-400 w-5"></i>
        <span class="text-sm font-medium text-gray-700">Tên miền:</span>
        <span class="text-sm text-gray-900"><a href="{% url 'students:detail' student.id %}" hx-get="{% url 'students:detail' student.id %}" hx-target="#main-content" hx-select="#main-content" hx-push-url="true" class="hover:text-primary-600 transition-colors">{{ student.domain }}</a></span>
    </div>
    <div class="flex items-center gap-2">
        <i class="fas fa-birthday-cake text-gray-400 w-5"></i>
        <span class="text-sm font-medium text-gray-700">Năm sinh:</span>
        <span class="text-sm text-gray-900">{{ student.birth_year|default:"Chưa cập nhật" }}</span>
    </div>
    <div class="flex items-center gap-2">
        <i class="fas fa-school text-gray-400 w-5"></i>
        <span class="text-sm font-medium text-gray-700">Trường học:</span>
        <span class="text-sm text-gray-900">{{ student.school|default:"Chưa cập nhật" }}</span>
    </div>
    <div class="flex items-center gap-2">
        <i class="fas fa-phone-alt text-gray-400 w-5"></i>
        <span class="text-sm font-medium text-gray-700">SĐT GD:</span>
        <span class="text-sm text-gray-900">{{ student.emergency_call|default:"Chưa cập nhật" }}</span>
    </div>
</div>
{% endif %}
