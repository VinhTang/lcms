{% extends "base.html" %}

{% block title %}404 - Không tìm thấy trang - LCMS{% endblock %}

{% block content %}
<div class="h-full flex flex-col items-center justify-center p-4 min-h-[70vh]">
    <div class="relative mb-8">
        <!-- Background Glow -->
        <div class="absolute -inset-4 bg-primary-400/20 blur-3xl rounded-full scale-150"></div>
        
        <!-- Icon Container -->
        <div class="relative w-32 h-32 md:w-48 md:h-48 bg-white/40 backdrop-blur-xl border border-white/40 rounded-[3rem] shadow-2xl flex items-center justify-center rotate-3 transform hover:rotate-0 transition-transform duration-500">
            <div class="text-center">
                <span class="text-5xl md:text-7xl font-black text-primary-600 tracking-tighter">404</span>
                <div class="w-full h-1.5 bg-primary-500/20 rounded-full mt-1 md:mt-2 scale-x-50"></div>
            </div>
        </div>
        
        <!-- Floating Elements -->
        <div class="absolute -top-4 -right-4 w-12 h-12 bg-rose-500 rounded-2xl shadow-lg flex items-center justify-center animate-bounce">
            <i class="fas fa-question text-white text-xl"></i>
        </div>
        <div class="absolute -bottom-2 -left-6 w-10 h-10 bg-amber-400 rounded-full shadow-lg flex items-center justify-center animate-pulse">
            <i class="fas fa-search text-white text-sm"></i>
        </div>
    </div>

    <div class="text-center max-w-md relative">
        <h1 class="text-3xl font-bold text-gray-800 mb-3 tracking-tight">Ồ! Chúng tôi bị lạc đường...</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            Trang bạn đang tìm kiếm có thể đã bị di chuyển, xóa hoặc không tồn tại. Đừng lo, hãy để chúng tôi dẫn bạn về nhà.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 items-center justify-center">
            <a href="{% url 'dashboard' %}" 
               hx-get="{% url 'dashboard' %}"
               hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
               class="btn-primary flex items-center gap-3 px-8 py-3.5 !shadow-xl !shadow-primary-200">
                <i class="fas fa-home"></i> Quay về Dashboard
            </a>
            <button onclick="window.history.back()" 
                    class="btn-secondary flex items-center gap-3 px-8 py-3.5 border border-gray-200 hover:bg-white transition-colors">
                <i class="fas fa-arrow-left"></i> Trang trước đó
            </button>
        </div>
    </div>

    <!-- Decoration -->
    <div class="mt-16 flex gap-8 md:gap-16 opacity-30">
        <i class="fas fa-book-open text-4xl text-primary-300"></i>
        <i class="fas fa-microscope text-4xl text-primary-300"></i>
        <i class="fas fa-calculator text-4xl text-primary-300"></i>
        <i class="fas fa-palette text-4xl text-primary-300"></i>
    </div>
</div>
{% endblock %}
