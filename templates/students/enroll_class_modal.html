<div id="history-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 htmx-added"
     x-data="{ open: true }"
     x-show="open"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 scale-95"
     x-transition:enter-end="opacity-100 scale-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 scale-100"
     x-transition:leave-end="opacity-0 scale-95"
     @keydown.escape.window="open = false; setTimeout(() => $el.remove(), 200)">
    
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col mx-4 overflow-hidden" @click.away="open = false; setTimeout(() => $el.remove(), 200)">
        <!-- Header -->
        <div class="px-5 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center rounded-t-xl">
            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-graduation-cap text-primary-600"></i>
                Gắn học sinh {{ student.full_name }} ({{ student.domain }}) vào lớp
            </h3>
            <button @click="open = false; setTimeout(() => $el.remove(), 200)" class="text-gray-400 hover:text-gray-600 transition-colors focus:outline-none p-1 rounded-full hover:bg-gray-200">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 overflow-y-auto p-5 relative bg-white">
            <form id="enroll-class-form" method="post" action="{% url 'students:enroll_class' student.id %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Chọn lớp học <span class="text-red-500">*</span></label>
                    <select name="class_id" id="class_single_select" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-primary-500 focus:ring focus:ring-primary-200 focus:ring-opacity-50" required>
                        <option value="" disabled selected>-- Chọn lớp học --</option>
                        {% for c in available_classes %}
                            <option value="{{ c.id }}">{{ c.class_name }} ({{ c.get_schedule_display }} | {{ c.start_time|time:"H:i" }}-{{ c.end_time|time:"H:i" }})</option>
                        {% endfor %}
                    </select>
                    <p class="mt-2 text-sm text-gray-500"><i class="fas fa-calendar-check text-blue-500 mr-1"></i> Hệ thống sẽ tự động chặn nếu trùng lịch với lớp đang học.</p>
                </div>
            </form>
        </div>
        
        <!-- Footer -->
        <div class="px-5 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3 rounded-b-xl">
            <button type="button" @click="open = false; setTimeout(() => $el.remove(), 200)" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition-colors text-sm shadow-sm">
                Hủy bỏ
            </button>
            <button type="submit" form="enroll-class-form" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg font-medium transition-colors text-sm shadow-sm flex items-center gap-2" {% if not available_classes %}disabled{% endif %}>
                <i class="fas fa-save"></i>
                Lưu vào lớp
            </button>
        </div>
    </div>
</div>

<script>
    if (typeof TomSelect !== 'undefined') {
        new TomSelect('#class_single_select', {
            placeholder: 'Tìm kiếm lớp học...',
        });
    }
</script>
