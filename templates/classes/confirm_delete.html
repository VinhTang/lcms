{% extends "base.html" %}

{% block title %}Xóa lớp học - LCMS{% endblock %}

{% block content %}
<div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h2 mb-1"><i class="fas fa-trash me-2"></i>Xóa lớp học</h1>
            <p class="mb-0 opacity-75">Xác nhận xóa lớp học khỏi hệ thống</p>
        </div>
        <a href="{% url 'classes:list' %}" class="btn btn-light fw-bold">
            <i class="fas fa-arrow-left me-2"></i>Quay lại
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card sb-card">
            <div class="card-header bg-danger text-white py-3">
                <h5 class="mb-0 fw-bold">
                    <i class="fas fa-exclamation-triangle me-2"></i>Xác nhận xóa
                </h5>
            </div>
            <div class="card-body text-center py-4">
                <div class="mb-4">
                    <div class="avatar-circle mx-auto mb-3" style="width: 80px; height: 80px; background: linear-gradient(135deg, #f6c23e, #dda20a); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-school fa-2x text-white"></i>
                    </div>
                    <h4 class="fw-bold">{{ class_obj.class_name }}</h4>
                    <p class="text-muted mb-0">Mã: <code>{{ class_obj.class_code }}</code></p>
                </div>
                
                <div class="alert alert-warning d-flex align-items-center" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <div>
                        Hành động này <strong>không thể hoàn tác</strong>.
                    </div>
                </div>
                
                <form method="post" class="d-flex gap-3 justify-content-center mt-4">
                    {% csrf_token %}
                    <a href="{% url 'classes:list' %}" class="btn btn-secondary btn-lg px-4">
                        <i class="fas fa-times me-2"></i>Hủy
                    </a>
                    <button type="submit" class="btn btn-danger btn-lg px-4">
                        <i class="fas fa-trash me-2"></i>Xóa
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
