services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=lcms
      - POSTGRES_USER=lcms_user
      - POSTGRES_PASSWORD=lcms_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcms_user -d lcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build: .
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=your-super-secret-key-change-this
      - DATABASE_URL=postgres://lcms_user:lcms_password@db:5432/lcms
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,your-domain.com
      - CSRF_TRUSTED_ORIGINS=https://your-domain.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  celery_worker:
    build: .
    command: celery -A lcms worker --loglevel=info
    volumes:
      - .:/app
      - media_volume:/app/media
    environment:
      - DATABASE_URL=postgres://lcms_user:lcms_password@db:5432/lcms
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build: .
    command: celery -A lcms beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://lcms_user:lcms_password@db:5432/lcms
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
